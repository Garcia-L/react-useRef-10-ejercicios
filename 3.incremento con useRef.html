<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>incremento con useRef</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useRef} = React;

        const App = () => {

          const contadorRef = useRef(0);
          function sumarState() {
          contadorRef.current++;
              console.log(contadorRef.current)
        }
            

            return (
                <div className="">
                    <h1>Incremento con incremento</h1>
                  
                    <p>Revisa el contador con useRef en consola</p>
                  
                    <button onClick={sumarState}>+</button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
