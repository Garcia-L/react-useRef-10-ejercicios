<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medir tamaño de un elemento</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
          const [ancho, setAncho] = useState(0);
          const divRef = useRef(null);

          useEffect(
            () => {
              if (divRef.current) {
              setAncho( divRef.current.offsetWidth )
              }
            }, []
          );
          

            return (
                <div>
                    <h1>Medir tamaño de un elemento</h1>
                    <p>Construye:</p>
                    <ul>
                      <li>un div con tamaño fijo</li>
                      <li>mide su ancho</li>
                      <li>muéstralo en pantalla</li>
                    </ul>
                    <div ref={divRef} style={{ width: "300px", height: "300px", background: "lightgreen" }}></div>
                  <p>Ancho capturado: {ancho} px</p>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
