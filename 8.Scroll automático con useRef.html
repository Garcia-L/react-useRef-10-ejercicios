<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll automático</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
    </header>


    <main>
        <!-- contenedor donde se renderiza (O pinta) la web o aplicación -->
        <div id="root"></div>
    </main>


    <footer>
    </footer>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [mensaje, setMensaje] = useState([]);
            const bajarRef = useRef(null);
          
            useEffect(
              () => {
                if (bajarRef.current) {
                  bajarRef.current.scrollIntoView();
                }
              }, [mensaje]
            );

            const agregarMensaje = () => {
              setMensaje( (prev)=> [...prev, `Mensaje ${prev.length +1}`] );
            };
              
          
            return (
                <div>
                    <h1>Scroll automático</h1>
                    <p>Pista: usa scrollIntoView()</p>
                  
                  <ul>
                    <li>Construye un array de mensajes (useState)</li>
                    <li>un botón "Agregar mensaje"</li>
                    <li>renderiza la lista</li>
                    <li>scroll automático con useRef</li>
                  </ul>

                  <button onClick={agregarMensaje}>Agregar mensaje</button>
                  <p>Lista de mensajes</p>
                  <ul>
                    {
                      mensaje.map(
                        (e, i) => 
                            <li key={i}>{e}</li>
                      )
                    }
                  </ul> 
                  <div ref={bajarRef}> </div>
                   
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)

    </script>

</body>

</html>
